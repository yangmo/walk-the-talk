name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:    # 允许手动触发

# 取消同分支上还在排队 / 跑的旧 run，省 Actions 配额
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ============== Lint ==============
  # 单独的 lint job 跑得快（~30s），失败时不必等 test 的依赖装完
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install "ruff>=0.5"

      - name: ruff check
        run: ruff check .

      - name: ruff format --check
        run: ruff format --check .

  # ============== Test ==============
  # 矩阵覆盖 pyproject 声明的 ">=3.10"。Linux only：sandbox 限制，未在
  # macOS / Windows 上跑过；后续可加。
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false   # 一个 py 版本挂了，其它继续跑出来对比
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Show installed package versions
        run: pip list --format=columns

      - name: Run pytest with coverage
        run: |
          pytest -v \
            --cov=walk_the_talk \
            --cov-branch \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --junitxml=pytest.xml

      - name: Upload coverage to artifacts
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-py311
          path: |
            coverage.xml
            pytest.xml
          retention-days: 7
